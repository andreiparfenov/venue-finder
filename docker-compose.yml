services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    # Expose locally for mongosh access; remove in production
    ports:
      - "27017:27017"

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - GOOGLE_PLACES_API_KEY=${GOOGLE_PLACES_API_KEY}
      - NEBIUS_API_KEY=${NEBIUS_API_KEY}
      - MONGODB_URI=mongodb://mongo:27017/venue-finder
      - PORT=3001
    ports:
      - "3001:3001"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_GOOGLE_MAPS_KEY=${VITE_GOOGLE_MAPS_KEY}
        - VITE_API_URL=${VITE_API_URL:-}
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  mongo-data:
